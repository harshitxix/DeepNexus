<!-- 
    DESIGN SYSTEM FOR DEEP LEARNING DASHBOARD
    All styling rules, colors, and component definitions are centralized here
-->

<style>
/* ═══════════════════════════════════════════════════════════════════════════════
   1. COLOR PALETTE & DESIGN TOKENS
   ═══════════════════════════════════════════════════════════════════════════════ */

:root {
    /* PRIMARY COLORS */
    --color-primary: #5227FF;              /* Deep Purple - Main brand color */
    --color-primary-light: #7C3AED;        /* Light Purple - Hover states */
    --color-primary-lighter: #A78BFA;      /* Very Light Purple - Disabled states */
    
    /* BACKGROUND COLORS */
    --color-bg-main: #F4F5F8;              /* App canvas background */
    --color-bg-panel: #FFFFFF;             /* Primary card background */
    --color-bg-subtle: #EEF1F6;            /* Secondary surface */
    --color-sidebar-bg: #ECEFF5;           /* Sidebar background */
    
    /* TEXT COLORS */
    --color-text-primary: #0F172A;         /* Dark slate - Primary text */
    --color-text-secondary: #3A3F52;       /* Neutral dark for supporting text */
    --color-text-muted: #6B7280;           /* Muted text */
    
    /* BORDER & DIVIDER COLORS */
    --color-border-dark: #C8CDD8;          /* Strong borders */
    --color-border-light: #D9DEE8;         /* Subtle borders */
    --color-divider: #D8DCE6;              /* Light dividers */
    
    /* SEMANTIC COLORS */
    --color-success: #10B981;              /* Success/positive */
    --color-warning: #F59E0B;              /* Warning */
    --color-error: #DC2626;                /* Error/danger */
    --color-info: #3B82F6;                 /* Information */
    
    /* ACCENT & HIGHLIGHTS */
    --color-accent: #5227FF;               /* Same as primary - for highlights */
    --color-highlight: rgba(82, 39, 255, 0.1);  /* Soft highlight background */
    --color-highlight-border: rgba(82, 39, 255, 0.2);  /* Highlight border */
    
    /* SPACING */
    --spacing-xs: 0.25rem;
    --spacing-sm: 0.5rem;
    --spacing-md: 1rem;
    --spacing-lg: 1.5rem;
    --spacing-xl: 2rem;
    --spacing-2xl: 3rem;
    
    /* TYPOGRAPHY */
    --font-family-base: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --font-size-sm: 0.875rem;
    --font-size-base: 1rem;
    --font-size-lg: 1.125rem;
    --font-size-xl: 1.5rem;
    --font-size-2xl: 2rem;
    --font-weight-normal: 400;
    --font-weight-medium: 500;
    --font-weight-semibold: 600;
    --font-weight-bold: 700;
    
    /* BORDER RADIUS */
    --radius-sm: 4px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 18px;
    
    /* SHADOWS */
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
    --shadow-md: 0 4px 10px rgba(15, 23, 42, 0.08);
    --shadow-lg: 0 10px 24px rgba(15, 23, 42, 0.12);
    --shadow-accent: 0 6px 16px rgba(82, 39, 255, 0.16);
    --shadow-accent-hover: 0 10px 22px rgba(82, 39, 255, 0.24);
}

/* ═══════════════════════════════════════════════════════════════════════════════
   2. GLOBAL STYLES
   ═══════════════════════════════════════════════════════════════════════════════ */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body, html {
    background-color: var(--color-bg-main) !important;
    color: var(--color-text-primary) !important;
    font-family: var(--font-family-base);
    font-size: var(--font-size-base);
    line-height: 1.6;
}

[data-testid="stAppViewContainer"] {
    background: var(--color-bg-main) !important;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   3. MAIN CONTAINER & LAYOUT
   ═══════════════════════════════════════════════════════════════════════════════ */

.main {
    background: var(--color-bg-main) !important;
}

.block-container {
    padding-top: var(--spacing-lg) !important;
    max-width: 100% !important;
    background: transparent !important;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   4. TYPOGRAPHY
   ═══════════════════════════════════════════════════════════════════════════════ */

h1, h2, h3, h4, h5, h6 {
    color: var(--color-text-primary) !important;
    font-weight: var(--font-weight-semibold) !important;
    letter-spacing: -0.02em;
    margin-top: var(--spacing-lg) !important;
    margin-bottom: var(--spacing-md) !important;
}

h1 {
    color: var(--color-primary) !important;
    font-size: 2.55rem !important;
    font-weight: var(--font-weight-bold) !important;
    border-bottom: 4px solid var(--color-primary);
    padding-bottom: 0.7rem;
}

h2 {
    color: var(--color-text-primary) !important;
    font-size: var(--font-size-xl) !important;
    border-bottom: 2px solid var(--color-primary);
    padding-bottom: var(--spacing-sm);
}

h3 {
    color: var(--color-primary) !important;
    font-size: 2rem !important;
    line-height: 1.2;
}

p, span, div, li {
    color: var(--color-text-primary) !important;
}

[data-testid="stWidgetLabel"] p,
label,
[data-testid="stWidgetLabel"] {
    font-size: 1.08rem !important;
    font-weight: 500 !important;
    color: var(--color-text-primary) !important;
}

small, .small, [data-testid="stCaption"] {
    color: var(--color-text-muted) !important;
    font-size: 0.98rem !important;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   5. SIDEBAR STYLING
   ═══════════════════════════════════════════════════════════════════════════════ */

[data-testid="stSidebar"] {
    background-color: var(--color-sidebar-bg) !important;
}

[data-testid="stSidebarNav"] {
    background-color: var(--color-sidebar-bg) !important;
}

.sidebar-content {
    color: var(--color-text-primary) !important;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   6. BUTTONS & INTERACTIVE ELEMENTS
   ═══════════════════════════════════════════════════════════════════════════════ */

button {
    background-color: var(--color-primary) !important;
    color: white !important;
    border: none !important;
    font-weight: var(--font-weight-semibold) !important;
    border-radius: var(--radius-md) !important;
    padding: 0.55rem 1.1rem !important;
    cursor: pointer !important;
    transition: all 0.3s ease !important;
    box-shadow: 0 2px 6px rgba(82, 39, 255, 0.2) !important;
}

button:hover {
    background-color: var(--color-primary-light) !important;
    transform: translateY(-2px) !important;
    box-shadow: var(--shadow-accent) !important;
}

[data-testid="stButton"] button {
    border-radius: 10px !important;
    font-size: 0.95rem !important;
}

[data-testid="stButton"] button,
[data-testid="stFormSubmitButton"] button,
[data-testid="baseButton-secondary"],
[data-testid="baseButton-primary"] {
    color: #FFFFFF !important;
    font-weight: 700 !important;
}

[data-testid="stButton"] button * {
    color: #FFFFFF !important;
    font-weight: 700 !important;
}

button:active {
    transform: translateY(0) !important;
}

button:disabled {
    background-color: var(--color-primary-lighter) !important;
    cursor: not-allowed !important;
    opacity: 0.6;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   7. INPUT FIELDS & FORMS
   ═══════════════════════════════════════════════════════════════════════════════ */

input, textarea, select {
    color: var(--color-text-primary) !important;
    background-color: white !important;
    border: 1.5px solid var(--color-border-dark) !important;
    border-radius: var(--radius-md) !important;
    padding: 0.6rem 0.95rem !important;
    font-family: var(--font-family-base) !important;
    transition: all 0.3s ease !important;
}

input:focus, textarea:focus, select:focus {
    border-color: var(--color-primary) !important;
    box-shadow: 0 0 0 3px var(--color-highlight) !important;
    outline: none !important;
}

*:focus-visible {
    outline: none !important;
}

input, textarea, select, button {
    outline: none !important;
}

/* Selectbox */
[data-testid="stSelectbox"] select, [data-baseweb="select"] {
    color: var(--color-text-primary) !important;
    background-color: white !important;
    border: 1.5px solid var(--color-border-dark) !important;
    border-radius: 10px !important;
}

[data-testid="stSelectbox"] div[data-baseweb="select"] > div {
    min-height: 46px !important;
    border-radius: 10px !important;
    background: #FFFFFF !important;
    border: 1.5px solid var(--color-border-dark) !important;
    box-shadow: none !important;
}

/* Force BaseWeb wrappers to use soft outlines (fix ugly black borders) */
[data-baseweb="input"],
[data-baseweb="base-input"],
[data-testid="stTextInput"] div[data-baseweb="input"] > div,
[data-testid="stNumberInput"] div[data-baseweb="input"] > div {
    border: 1.5px solid var(--color-border-dark) !important;
    border-radius: 12px !important;
    box-shadow: none !important;
    background: #FFFFFF !important;
}

[data-baseweb="input"]:focus-within,
[data-baseweb="base-input"]:focus-within,
[data-testid="stTextInput"] div[data-baseweb="input"] > div:focus-within,
[data-testid="stNumberInput"] div[data-baseweb="input"] > div:focus-within {
    border-color: var(--color-primary) !important;
    box-shadow: 0 0 0 3px var(--color-highlight) !important;
}

[data-testid="stTextInput"] fieldset,
[data-testid="stNumberInput"] fieldset,
[data-testid="stSelectbox"] fieldset {
    border: 1.5px solid var(--color-border-dark) !important;
    border-radius: 12px !important;
}

[data-testid="stTextInput"] fieldset:focus-within,
[data-testid="stNumberInput"] fieldset:focus-within,
[data-testid="stSelectbox"] fieldset:focus-within {
    border-color: var(--color-primary) !important;
}

[data-testid="stSelectbox"] div[data-baseweb="select"] > div:hover {
    border-color: #B9C1D0 !important;
}

[data-testid="stSelectbox"] div[data-baseweb="select"] > div:focus-within {
    border-color: var(--color-primary) !important;
    box-shadow: 0 0 0 3px var(--color-highlight) !important;
}

/* Dropdown popover menu fix (remove black menu/background) */
[data-baseweb="popover"],
[data-baseweb="select"] [role="listbox"],
[role="listbox"] {
    background: #FFFFFF !important;
    color: var(--color-text-primary) !important;
    border: 1px solid var(--color-border-light) !important;
    border-radius: 10px !important;
    box-shadow: 0 8px 22px rgba(15, 23, 42, 0.12) !important;
}

[role="option"] {
    background: #FFFFFF !important;
    color: var(--color-text-primary) !important;
}

[role="option"][aria-selected="true"],
[role="option"]:hover {
    background: #F2EEFF !important;
    color: #2E226D !important;
}

/* Remove blinking square caret artifact inside select input */
[data-baseweb="select"] input,
[data-baseweb="select"] [contenteditable="true"] {
    caret-color: transparent !important;
    color: var(--color-text-primary) !important;
}

[data-baseweb="select"] input,
div[role="combobox"] input {
    background: transparent !important;
    border: 0 !important;
    box-shadow: none !important;
    padding: 0 !important;
    margin: 0 !important;
    width: 0 !important;
    min-width: 0 !important;
    max-width: 0 !important;
    opacity: 0 !important;
}

[data-baseweb="select"] div[aria-hidden="true"] {
    background: transparent !important;
}

[data-baseweb="select"] svg {
    color: #4B5563 !important;
    fill: #4B5563 !important;
}

[data-testid="stNumberInput"] input,
[data-testid="stTextInput"] input {
    min-height: 44px !important;
    border-radius: 12px !important;
    font-size: 1.08rem !important;
    box-shadow: none !important;
}

[data-testid="stNumberInput"] button {
    background: #ECEEF4 !important;
    color: #2E226D !important;
    border: 1px solid #D4D9E5 !important;
    box-shadow: none !important;
    border-radius: 8px !important;
    min-width: 40px !important;
    min-height: 38px !important;
    padding: 0 !important;
}

[data-testid="stNumberInput"] button *,
[data-testid="stNumberInput"] button span {
    color: #2E226D !important;
    font-weight: 700 !important;
}

[data-testid="stNumberInput"] button:hover {
    background: #E3E7F1 !important;
    transform: none !important;
    box-shadow: none !important;
}

[data-testid="stTextInput"] > div > div,
[data-testid="stNumberInput"] > div > div {
    border-radius: 12px !important;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   8. DIVIDERS & SEPARATORS
   ═══════════════════════════════════════════════════════════════════════════════ */

hr {
    border: none !important;
    border-top: 2px solid var(--color-divider) !important;
    margin: var(--spacing-lg) 0 !important;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   9. METRIC CARDS & CONTAINERS
   ═══════════════════════════════════════════════════════════════════════════════ */

[data-testid="metric-container"] {
    background-color: var(--color-bg-panel) !important;
    border: 1px solid var(--color-border-light) !important;
    border-radius: 14px !important;
    padding: 0.95rem 1.1rem !important;
    box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06) !important;
}

[data-testid="stContainer"] {
    background-color: transparent !important;
}

[data-testid="stVerticalBlock"] > [style*="flex-direction: column"] > [data-testid="stVerticalBlockBorderWrapper"] {
    background: var(--color-bg-panel) !important;
    border: 1px solid var(--color-border-light) !important;
    border-radius: 16px !important;
    box-shadow: 0 2px 10px rgba(15, 23, 42, 0.07) !important;
    padding: 0.35rem !important;
}

/* Treat main horizontal control groups as cards (Neuron Parameters/Test Input style) */
[data-testid="stHorizontalBlock"] {
    background: #FFFFFF !important;
    border: 1px solid var(--color-border-light) !important;
    border-radius: 16px !important;
    box-shadow: 0 2px 10px rgba(15, 23, 42, 0.07) !important;
    padding: 1rem !important;
    margin-bottom: 0.9rem !important;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   10. EXPANDABLE SECTIONS & TABS
   ═══════════════════════════════════════════════════════════════════════════════ */

[data-testid="stExpander"] {
    background-color: var(--color-bg-panel) !important;
    border: 2px solid var(--color-border-light) !important;
    border-radius: var(--radius-md) !important;
}

[data-testid="stExpander"] > div > button {
    color: var(--color-text-primary) !important;
    font-weight: var(--font-weight-semibold) !important;
}

[data-testid="stExpander"] > div > button:hover {
    background-color: transparent !important;
    color: var(--color-primary) !important;
}

/* Tabs */
[data-testid="stTabs"] [role="tab"] {
    color: #FFFFFF !important;
    background: linear-gradient(145deg, #5B30FF, #4A21E8) !important;
    border: 1px solid #4A21E8 !important;
    border-bottom: 2px solid var(--color-border-light) !important;
    font-weight: 700 !important;
    font-size: 1.22rem !important;
    border-radius: 14px !important;
    padding: 0.6rem 1.2rem !important;
    box-shadow: 0 6px 14px rgba(82, 39, 255, 0.22) !important;
    transition: all 0.3s ease !important;
}

[data-testid="stTabs"] [role="tab"]:hover {
    color: #FFFFFF !important;
    background: linear-gradient(145deg, #6A40FF, #5227FF) !important;
}

[data-testid="stTabs"] [role="tab"][aria-selected="true"] {
    color: #FFFFFF !important;
    border-bottom-color: #E73965 !important;
    font-weight: 700 !important;
}

/* Sliders (match screenshot look) */
[data-testid="stSlider"] [role="slider"] {
    background: #A52563 !important;
    border: 2px solid #7B1E4D !important;
    width: 18px !important;
    height: 18px !important;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2) !important;
}

[data-testid="stSlider"] div[data-baseweb="slider"] > div > div {
    background: #D5D9E4 !important;
    height: 6px !important;
    border-radius: 999px !important;
}

[data-testid="stSlider"] div[data-baseweb="slider"] > div > div > div {
    background: #A52563 !important;
    border-radius: 999px !important;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   11. CODE BLOCKS & PRE-FORMATTED TEXT
   ═══════════════════════════════════════════════════════════════════════════════ */

code {
    background-color: var(--color-bg-subtle) !important;
    border: 1px solid var(--color-border-light) !important;
    color: var(--color-error) !important;
    border-radius: var(--radius-sm) !important;
    padding: var(--spacing-xs) var(--spacing-sm) !important;
    font-weight: var(--font-weight-medium) !important;
}

pre {
    background-color: var(--color-bg-panel) !important;
    border: 2px solid var(--color-primary) !important;
    color: var(--color-text-primary) !important;
    border-radius: var(--radius-md) !important;
    padding: var(--spacing-md) !important;
    overflow-x: auto !important;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   12. TABLES
   ═══════════════════════════════════════════════════════════════════════════════ */

table {
    border-collapse: collapse !important;
    width: 100% !important;
    background: #F8FAFC !important;
    border: 1px solid var(--color-border-light) !important;
    border-radius: 12px !important;
    overflow: hidden !important;
}

th {
    background-color: #F1F4F9 !important;
    color: var(--color-primary) !important;
    font-weight: var(--font-weight-semibold) !important;
    border: 1px solid var(--color-border-light) !important;
    padding: var(--spacing-md) !important;
    font-size: 1.02rem !important;
    text-align: left !important;
}

td {
    color: var(--color-text-primary) !important;
    background: #FCFDFF !important;
    border: 1px solid var(--color-border-light) !important;
    padding: var(--spacing-md) !important;
    font-size: 1.01rem !important;
}

[data-testid="stDataFrame"],
[data-testid="stTable"] {
    background: #F8FAFC !important;
    border: 1px solid var(--color-border-light) !important;
    border-radius: 14px !important;
    overflow: hidden !important;
}

tbody tr:nth-child(even) {
    background-color: #F4F7FC !important;
}

tbody tr:hover {
    background-color: var(--color-highlight) !important;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   13. ALERT & MESSAGE BOXES
   ═══════════════════════════════════════════════════════════════════════════════ */

[data-testid="stAlert"] {
    background-color: var(--color-highlight) !important;
    border-left: 4px solid var(--color-primary) !important;
    border-radius: var(--radius-md) !important;
    color: var(--color-text-primary) !important;
    padding: var(--spacing-md) !important;
}

/* Info alert */
[data-testid="stAlert"] [data-testid="stMarkdownContainer"] {
    color: var(--color-text-primary) !important;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   14. MODULE NAVIGATION
   ═══════════════════════════════════════════════════════════════════════════════ */

.module-nav {
    background: #FFFFFF !important;
    border: 1px solid var(--color-border-light) !important;
    border-radius: var(--radius-lg) !important;
    padding: var(--spacing-md) !important;
    margin-bottom: var(--spacing-md) !important;
    transition: all 0.3s ease !important;
    cursor: pointer !important;
    color: var(--color-text-primary) !important;
    box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06) !important;
}

.module-nav:hover {
    transform: translateX(4px) !important;
    border-color: var(--color-primary) !important;
    background: white !important;
    box-shadow: var(--shadow-accent) !important;
}

.module-nav.active {
    background: #F3F0FF !important;
    border-color: var(--color-primary) !important;
    box-shadow: var(--shadow-accent) !important;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   15. GRAPH & CHART STYLING
   ═══════════════════════════════════════════════════════════════════════════════ */

/* Plotly charts */
.plotly { background-color: var(--color-bg-main) !important; }

.plotly-graph {
    background-color: #FFFFFF !important;
    border-radius: var(--radius-md) !important;
}

[data-testid="stPlotlyChart"] {
    background: #FFFFFF !important;
    border: 1.5px solid #D5DCE8 !important;
    border-radius: 18px !important;
    box-shadow: 0 2px 9px rgba(15, 23, 42, 0.07) !important;
    padding: 0.4rem 0.45rem 0.2rem 0.45rem !important;
    margin-bottom: 0.6rem !important;
}

/* Force graph text to stay visible on light backgrounds */
.js-plotly-plot .plotly .xtick text,
.js-plotly-plot .plotly .ytick text,
.js-plotly-plot .plotly .gtitle,
.js-plotly-plot .plotly .annotation-text,
.js-plotly-plot .plotly text {
    fill: #1F2937 !important;
    color: #1F2937 !important;
    font-size: 14px !important;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   16. UTILITY CLASSES
   ═══════════════════════════════════════════════════════════════════════════════ */

.text-primary { color: var(--color-primary) !important; }
.text-secondary { color: var(--color-text-secondary) !important; }
.text-muted { color: var(--color-text-muted) !important; }
.text-error { color: var(--color-error) !important; }
.text-success { color: var(--color-success) !important; }

.bg-primary { background-color: var(--color-primary) !important; }
.bg-panel { background-color: var(--color-bg-panel) !important; }
.bg-subtle { background-color: var(--color-bg-subtle) !important; }

.border-primary { border-color: var(--color-primary) !important; }
.border-light { border-color: var(--color-border-light) !important; }

.rounded-sm { border-radius: var(--radius-sm) !important; }
.rounded-md { border-radius: var(--radius-md) !important; }
.rounded-lg { border-radius: var(--radius-lg) !important; }

.shadow-sm { box-shadow: var(--shadow-sm) !important; }
.shadow-md { box-shadow: var(--shadow-md) !important; }
.shadow-lg { box-shadow: var(--shadow-lg) !important; }
.shadow-accent { box-shadow: var(--shadow-accent) !important; }

.p-sm { padding: var(--spacing-sm) !important; }
.p-md { padding: var(--spacing-md) !important; }
